services:
  mongodb:
    image: mongo:latest
    ports:
      - 27017:27017
  server:
    build:
      context: ./server
      dockerfile: dockerfile
    container_name: atman-server
    ports:
      - 5000:5000
    env_file:
      - ./server/.env
    depends_on:
      - mongodb
  client:
    build:
      context: ./client
      dockerfile: dockerfile
    container_name: atman-client
    ports:
      - 5173:80
    env_file:
      - ./client/.env
    depends_on:
      - server
